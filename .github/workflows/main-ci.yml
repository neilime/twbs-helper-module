name: Main - Continuous Integration

on:
  push:
    branches:
      - main
      - 4.x

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ci:
    name: Continuous Integration
    uses: ./.github/workflows/__shared-ci.yml
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    secrets: inherit
    with:
      publish: ${{ github.ref_name == github.event.repository.default_branch }}

  deploy:
    if: github.ref_name == github.event.repository.default_branch
    name: Deploy website
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - id: deployment
        uses: hoverkraft-tech/ci-github-publish/actions/deploy/github-pages@48e0c54489152b98d9e18f0454ccce120e9d0fd1 # 0.23.0
        with:
          build-path: ${{ needs.ci.outputs.website-artifact-path }}
          build-artifact-id: ${{ needs.ci.outputs.website-artifact-id }}
