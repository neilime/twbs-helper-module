name: Pull request - Continuous Integration

on:
  pull_request:
    branches:
      - main
      - 4.x
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ci:
    name: Continuous Integration
    uses: ./.github/workflows/__shared-ci.yml
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    secrets: inherit
