name: Shared - Continuous Integration for common tasks

on:
  workflow_call:
    inputs:
      publish:
        default: false
        type: boolean
    outputs:
      website-artifact-id:
        description: "The uploaded website build artifact ID"
        value: ${{ jobs.build-website.outputs.artifact-id }}
      website-artifact-path:
        description: "The uploaded website build artifact path"
        value: ${{ jobs.build-website.outputs.artifact-path }}

permissions: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - php-versions: "8.2"
          - php-versions: "8.3"
          - php-versions: "8.4"
          - php-versions: "8.5"
            stable: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: ⚙️ Setup PHP, with composer and extensions
        uses: ./.github/workflows/actions/setup-php
        with:
          php-version: ${{ matrix.php-versions }}

      - name: ♻️ Tools cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tools/cache
          key: ${{ runner.os }}-tools-${{ matrix.php-versions }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tools-

      - name: 👕 Lint
        if: matrix.stable
        run: composer php-cs-fixer -- --format=checkstyle | tools/vendor/bin/cs2pr

      - name: 🔬 Rector
        id: rector
        if: matrix.stable
        run: composer rector

      - name: 🔬 Static analysis
        if: matrix.stable
        run: composer phpstan -- --error-format=github

      - name: ♻️ Tests cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tests/.phpunit.result.cache
          key: ${{ runner.os }}-tests-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tests-

      - name: 🧪 Test
        run: composer test:ci

      - name: 📊 Upload coverage results to Codecov
        if: matrix.stable
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./build/logs/clover.xml

  build-website:
    name: Check that website is building without errors
    uses: ./.github/workflows/__build-website.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      publish: ${{ inputs.publish }}
